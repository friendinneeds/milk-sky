<!DOCTYPE html><html lang="en"><head>


<meta charset="utf-8">
<title>milk sky :: my files</title>
<style>
:root{
  --blue-1:#eaf3fb;
  --blue-2:#cfe3f7;
  --blue-3:#a7c8ec;
  --blue-4:#6fa8db;
  --blue-5:#3a78b8;
  --navy:#0b3a66;
  --ink:#102a43;
  --row-alt:#f4f9ff;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family: Verdana, Tahoma, Geneva, sans-serif;
  font-size:12px;
  color:var(--ink);
  background: #cfe3f7;
  overflow:hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

body::before{content:"";display:none}
body::after{
  content:"";
  position:fixed;
  inset:0;
  background: linear-gradient(180deg, rgba(234,244,255,.18), rgba(207,227,247,.28));
  pointer-events:none;
  z-index:-1;
}

.win{
  width:min(820px, 92vw);
  background:#fff;
  border:1px solid var(--blue-5);
  border-radius:6px 6px 4px 4px;
  box-shadow: 0 1px 0 #fff inset, 0 14px 30px rgba(20,55,100,.25);
  overflow:hidden;
  position:relative;
  z-index: 30;
  --gx: 0px;
  --gy: 0px;
  transform-origin: 50% 0%;
  transition:
    transform .42s cubic-bezier(.55,.05,.6,.2),
    clip-path .42s cubic-bezier(.55,.05,.6,.2),
    -webkit-clip-path .42s cubic-bezier(.55,.05,.6,.2),
    opacity .42s linear;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
  -webkit-clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
}
.win.genie-out{
  transform: translate(var(--gx), var(--gy)) scale(.05, .02);
  clip-path: polygon(0 0, 100% 0, 52% 100%, 48% 100%);
  -webkit-clip-path: polygon(0 0, 100% 0, 52% 100%, 48% 100%);
  opacity: 0;
  pointer-events: none;
}
.win.genie-in{
  /* Snap to collapsed state with no transition, then remove class to animate up */
  transition: none !important;
  transform: translate(var(--gx), var(--gy)) scale(.05, .02);
  clip-path: polygon(0 0, 100% 0, 52% 100%, 48% 100%);
  -webkit-clip-path: polygon(0 0, 100% 0, 52% 100%, 48% 100%);
  opacity: 0;
}
.win.hidden{ display:none; }

#genie-stage{ display:none; }

.winbtns button.hide-btn{ cursor:pointer }
.winbtns button.hide-btn:hover{ background:linear-gradient(180deg,#fff,#ffe28a) }

.restore-pill{
  position:fixed;
  left:50%;
  bottom:18px;
  transform: translateX(-50%) translateY(20px);
  opacity:0;
  pointer-events:none;
  background:linear-gradient(180deg,#fff,#d6e6f6);
  color:var(--navy);
  border:1px solid var(--blue-5);
  border-radius:14px;
  padding:5px 14px;
  font: bold 11px Verdana, Tahoma, sans-serif;
  box-shadow: 0 4px 12px rgba(20,55,100,.25), inset 0 1px 0 #fff;
  cursor:pointer;
  z-index:60;
  transition: opacity .25s ease, transform .25s ease;
}
.restore-pill.show{
  opacity:1;
  pointer-events:auto;
  transform: translateX(-50%) translateY(0);
}
.restore-pill:hover{ background:linear-gradient(180deg,#fff,#bcd6ef) }

.titlebar{
  position:relative;
  height:26px;
  display:flex;
  align-items:center;
  gap:8px;
  padding:0 8px;
  background: linear-gradient(180deg,#dcecfb 0%, #b6d4ef 45%, #8fbbe2 50%, #b6d4ef 55%, #dcecfb 100%);
  border-bottom:1px solid var(--blue-5);
  font-weight:bold;
  color:var(--navy);
  text-shadow:0 1px 0 rgba(255,255,255,.7);
  cursor: grab;
  user-select: none;
}
.titlebar:active{ cursor: grabbing; }
.dots{display:flex;gap:5px;margin-right:4px}
.dot{
  width:13px;height:13px;border-radius:50%;
  border:1px solid rgba(0,0,0,.25);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
}
#hide-btn{ cursor:pointer; transition: transform .1s ease; }
#hide-btn:hover{ transform: scale(1.15); filter: brightness(1.1); }
#hide-btn:active{ transform: scale(.92); }
.d-r{background:radial-gradient(circle at 30% 30%, #ffb1ad, #c93f3a)}
.d-y{background:radial-gradient(circle at 30% 30%, #ffe28a, #c8961d)}
.d-g{background:radial-gradient(circle at 30% 30%, #b6f0a3, #2f8f2a)}
.title{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:12px;pointer-events:none;white-space:nowrap}
.winbtns{display:flex;gap:4px}
.winbtns button{
  all:unset;cursor:pointer;font-family:inherit;font-size:11px;
  padding:1px 7px;color:var(--navy);
  background:linear-gradient(180deg,#fff,#d6e6f6);
  border:1px solid var(--blue-5);border-radius:3px;
}
.winbtns button:hover{background:linear-gradient(180deg,#fff,#bcd6ef)}

.toolbar{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;
  background:linear-gradient(180deg,#f3f8ff,#dceaf8);
  border-bottom:1px solid var(--blue-3);
}
.nav{display:flex;gap:2px}
.btn{
  font-family:inherit;font-size:11px;
  padding:2px 8px;
  background:linear-gradient(180deg,#fff,#d6e6f6);
  border:1px solid var(--blue-4);
  border-radius:3px;
  color:var(--navy);
  cursor:pointer;
}
.btn:hover{background:linear-gradient(180deg,#fff,#bcd6ef)}
.btn.active{background:linear-gradient(180deg,#bcd6ef,#8fbbe2)}
.crumb{margin-left:6px;color:var(--navy);font-weight:bold}
.crumb a{color:var(--blue-5);text-decoration:underline;font-weight:normal;cursor:pointer}
.spacer{flex:1}
.search{
  display:flex;align-items:center;gap:4px;
  background:#fff;
  border:1px solid var(--blue-4);
  border-radius:10px;
  padding:1px 8px;
  width:160px;
}
.search input{all:unset;flex:1;font-size:11px;color:var(--ink)}
.search::before{content:"🔍";font-size:10px;opacity:.6}

.cols{
  display:grid;
  grid-template-columns: 36px 1fr 140px 80px 110px;
  background:linear-gradient(180deg,#e6f0fb,#c9ddf2);
  border-bottom:1px solid var(--blue-4);
  color:var(--navy);
  font-weight:bold;
  font-size:11px;
}
.cols > div{
  padding:4px 8px;
  border-right:1px solid #b9d2ec;
  user-select:none;
}
.cols > div:last-child{border-right:none}
.cols > div[data-sort]:hover{ background: linear-gradient(180deg,#daeaf8,#bdd5ef); }
.cols .sorted::after{ content:" ▾"; color:var(--blue-5); }
.cols .sorted[data-dir="desc"]::after{ content:" ▴"; }

.list{
  background:#fff;
  max-height:420px;
  overflow:auto;
}

/* ---- Grid view ---- */
.list.grid-view{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
  gap: 8px;
  padding: 10px;
}
.grid-item{
  aspect-ratio: 1;
  border: 1px solid var(--blue-3);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background: var(--blue-1);
  user-select: none;
  transition: border-color .12s, box-shadow .12s;
}
.grid-item:hover{
  border-color: var(--blue-4);
  box-shadow: 0 2px 8px rgba(20,55,100,.18);
}
.grid-item img{
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.grid-icon{
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.grid-icon .g{
  width: 46px;
  height: 46px;
  border-radius: 4px;
  border-width: 2px;
}
.grid-label{
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(11,58,102,.82);
  color: #fff;
  font-size: 9px;
  padding: 4px 5px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  opacity: 0;
  transition: opacity .13s;
}
.grid-item:hover .grid-label{ opacity: 1; }
.grid-del{
  all: unset;
  position: absolute;
  top: 4px; right: 4px;
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1px solid #c93f3a;
  background: rgba(255,217,214,.9);
  color: #c93f3a;
  font: bold 13px/1 Verdana, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity .12s;
}
.grid-item:hover .grid-del{ opacity: 1; }
.grid-del:hover{ background: #c93f3a; color: #fff; }

.dropzone{
  background:repeating-linear-gradient(45deg, #f4f9ff 0 8px, #fff 8px 16px);
  border-top:1px dashed var(--blue-4);
  border-bottom:1px solid var(--blue-3);
  padding:14px 12px;
  text-align:center;
  color:var(--navy);
  cursor:pointer;
  transition: background .12s ease, border-color .12s ease;
}
.dropzone.hot{
  background:linear-gradient(180deg,#fff5cf,#ffe18a);
  border-color:#c8961d;
}
.dropzone.empty{
  padding:32px 12px;
}
.dz-title{ font-weight:bold; font-size:13px; margin-bottom:4px; letter-spacing:.3px; }
.dz-sub{ font-size:11px; color:var(--blue-5); }
.dz-link{
  all:unset;
  cursor:pointer;
  color:var(--blue-5);
  text-decoration:underline;
  font-weight:bold;
}
.dz-link:hover{ color:var(--navy); }
.row{
  display:grid;
  grid-template-columns: 36px 1fr 140px 80px 110px;
  align-items:center;
  border-bottom:1px dotted #cfe0f3;
  cursor:default;
  color:var(--ink);
}
.row:nth-child(even){background:var(--row-alt)}
.row.selected{
  background:linear-gradient(180deg,#bcd6ef,#8fbbe2) !important;
  color:var(--navy);
}
.row:hover{
  background:linear-gradient(180deg,#dbecff,#a7c8ec);
  color:var(--navy);
}
.kind-cell{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
}
.kind-text{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.del-btn{
  all:unset;
  width:18px;
  height:18px;
  border-radius:50%;
  border:1px solid #c93f3a;
  background:#ffd9d6;
  color:#c93f3a;
  font: bold 13px/1 Verdana, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  opacity:0;
  transition: opacity .12s ease, transform .1s ease;
  flex-shrink:0;
}
.row:hover .del-btn,
.row.selected .del-btn{ opacity:1 }
.del-btn:hover{
  background:#c93f3a;
  color:#fff;
  transform: scale(1.1);
}
.del-btn:active{ transform: scale(.92) }
.row > div{
  padding:4px 8px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.row .ico{padding:2px 4px 2px 8px;text-align:center}
.row .name{text-decoration:underline;color:var(--blue-5);cursor:pointer}
.row .name:hover{color:#c93f3a}
.row:hover .name{color:var(--navy)}
.row:hover .name:hover{color:#c93f3a}

.status{
  display:flex;align-items:center;justify-content:space-between;
  padding:3px 10px;
  background:linear-gradient(180deg,#dceaf8,#bcd6ef);
  border-top:1px solid var(--blue-4);
  color:var(--navy);
  font-size:11px;
}
.status .pill{
  background:#fff;border:1px solid var(--blue-3);
  border-radius:8px;padding:0 6px;
}

.preview-backdrop{
  position:fixed;
  inset:0;
  z-index:45;
  pointer-events:none;
  opacity:0;
  visibility:hidden;
  backdrop-filter: blur(24px) saturate(1.1);
  -webkit-backdrop-filter: blur(24px) saturate(1.1);
  background: rgba(207, 227, 247, 0.35);
  transition: opacity .18s ease, visibility 0s linear .18s;
  cursor: default;
}
.preview-backdrop.show{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
  transition: opacity .18s ease, visibility 0s linear 0s;
}

.preview{
  position:fixed;
  pointer-events:none;
  z-index:50;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  background:transparent;
  border:none;
  padding:0;
  box-shadow:none;
  opacity:0;
  visibility:hidden;
  transition: opacity .12s linear, visibility 0s linear .12s;
  width: max-content;
  max-width: 60vw;
  max-height: 60vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.preview.show{opacity:1; visibility:visible; transition: opacity .12s linear, visibility 0s linear 0s;}
.preview .img{
  display:flex;
  align-items:center;
  justify-content:center;
  border:none;
  background:transparent;
  position:relative;
  overflow:visible;
  max-width: 60vw;
  max-height: 60vh;
}
.preview .img img{
  max-width: 60vw;
  max-height: 60vh;
  width: auto;
  height: auto;
  object-fit: contain;
  display:block;
}
.preview .img img.portrait{
  max-height: 60vh;
  max-width: 35vw;
}
.preview .cap{ display:none }
.preview .cap{
  margin-top:6px;
  text-align:center;
  font-family: "Courier New", monospace;
  font-size:10px;
  color:var(--navy);
}

.g{display:inline-block;width:18px;height:18px;vertical-align:middle;border:1px solid var(--blue-5);background:#fff;position:relative;border-radius:2px}
.g.folder{background:linear-gradient(180deg,#ffe9a8,#e9b94a);border-color:#a07a1c}
.g.folder::before{content:"";position:absolute;left:1px;top:-3px;width:8px;height:4px;background:#e9b94a;border:1px solid #a07a1c;border-bottom:none;border-radius:2px 2px 0 0}
.g.img{background:linear-gradient(180deg,#bfe0ff,#7fb6e6)}
.g.img::after{content:"";position:absolute;left:2px;bottom:2px;right:6px;height:5px;background:#fff;border:1px solid var(--blue-5)}
.g.doc{background:#fff}
.g.doc::after{content:"≡";position:absolute;inset:0;display:grid;place-items:center;color:var(--blue-5);font-weight:bold;font-size:12px;line-height:1}
.g.pdf{background:#ffd9d6;border-color:#c93f3a}
.g.pdf::after{content:"PDF";position:absolute;inset:0;display:grid;place-items:center;color:#c93f3a;font-weight:bold;font-size:7px}
.g.zip{background:repeating-linear-gradient(45deg,#dcd1ff 0 4px,#b9a8f0 4px 8px);border-color:#5b3fb8}
.g.app{background:linear-gradient(180deg,#cfeacb,#7fc879);border-color:#2f8f2a}
.g.app::after{content:"★";position:absolute;inset:0;display:grid;place-items:center;color:#1f5b1c;font-size:11px;line-height:1}

.ph{position:absolute;inset:0}


























/* ---------------- Dock ---------------- */
.dock{
  position: fixed;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  z-index: 40;
  pointer-events: none;
}
.dock-inner{
  pointer-events: auto;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 6px 12px;
  border-radius: 10px;
  background: linear-gradient(180deg, rgba(225,238,252,.55) 0%, rgba(160,196,232,.55) 50%, rgba(120,164,210,.6) 100%);
  border: 1px solid rgba(255,255,255,.55);
  box-shadow:
    0 1px 0 rgba(255,255,255,.7) inset,
    0 -1px 0 rgba(255,255,255,.25) inset,
    0 10px 24px rgba(20,55,100,.28),
    0 2px 6px rgba(20,55,100,.18);
  backdrop-filter: blur(14px) saturate(1.35);
  -webkit-backdrop-filter: blur(14px) saturate(1.35);
}
.dock-inner::before{
  /* glassy top highlight */
  content:"";
  position:absolute;
  left:6px; right:6px; top:3px;
  height: 40%;
  border-radius: 8px 8px 14px 14px;
  background: linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,0));
  pointer-events:none;
}
.dock{ /* allow ::before */ }
.dock-inner{ position: relative; }
.dock-item{
  all: unset;
  cursor: pointer;
  width: 52px;
  height: 52px;
  display: grid;
  place-items: center;
  transition: transform .18s ease;
  filter: drop-shadow(0 3px 4px rgba(20,40,80,.35));
}
.dock-item svg,
.dock-item img{
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
  -webkit-user-drag: none;
}
.dock-item:hover{ transform: translateY(-8px) scale(1.18); }
.dock-item:active{ transform: translateY(-4px) scale(1.08); }
.dock-sep{
  width: 1px;
  height: 42px;
  background: linear-gradient(180deg, rgba(255,255,255,.7), rgba(20,40,80,.35));
  margin: 0 4px;
  align-self: center;
}


/* Running-app indicator dot under the Finder icon when window is minimized */
.dock-item.has-window{ position: relative; }
.dock-item.has-window::after{
  content: "";
  position: absolute;
  left: 50%;
  bottom: -3px;
  transform: translateX(-50%);
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #0b2540;
  box-shadow: 0 0 4px rgba(0,0,0,.45);
}
.dock-item.has-window{ cursor: pointer; }


/* Desktop shortcut icon (top-left, classic 2000s style) */
.desktop-icon{
  position: fixed;
  top: 18px;
  left: 22px;
  width: 76px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-decoration: none;
  color: var(--navy);
  font-family: Verdana, Tahoma, sans-serif;
  font-size: 11px;
  z-index: 5;
  user-select: none;
  cursor: pointer;
}
.desktop-icon-img{
  width: 56px;
  height: 56px;
  display: grid;
  place-items: center;
  filter: drop-shadow(1px 2px 0 rgba(0,0,0,.18));
}
.desktop-icon-img svg{ width: 100%; height: 100%; }
.desktop-icon-label{
  text-align: center;
  padding: 1px 5px;
  border-radius: 3px;
  text-shadow: 0 1px 0 rgba(255,255,255,.7);
  line-height: 1.15;
  max-width: 76px;
}
.desktop-icon:hover .desktop-icon-label{
  background: rgba(58, 120, 184, .85);
  color: #fff;
  text-shadow: none;
}
.desktop-icon:focus{ outline: 2px dotted var(--navy); outline-offset: 2px; }

.desktop-icon-img img{ width: 100%; height: 100%; object-fit: contain; -webkit-user-drag: none; }

.dropzone.reject{ animation: dz-shake .35s ease both; background: rgba(255, 100, 100, .12) !important; }
@keyframes dz-shake{
  0%,100%{ transform: translateX(0); }
  20%{ transform: translateX(-4px); }
  40%{ transform: translateX(4px); }
  60%{ transform: translateX(-3px); }
  80%{ transform: translateX(3px); }
}

/* ===== Aqua confirm dialog ===== */
.modal-overlay{
  position: fixed; inset: 0;
  background: rgba(20, 40, 70, .25);
  z-index: 200;
  display: grid;
  place-items: center;
  animation: fadeIn .15s ease;
}
.modal-overlay[hidden]{ display: none; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.aqua-dialog{
  width: 420px;
  max-width: 92vw;
  background: linear-gradient(180deg, #f5f7fa 0%, #e6ecf3 100%);
  border: 1px solid #6f88a8;
  border-radius: 8px;
  box-shadow:
    0 18px 40px rgba(20,40,70,.45),
    0 2px 0 rgba(255,255,255,.7) inset;
  font-family: "Lucida Grande", "Helvetica Neue", Helvetica, Arial, sans-serif;
  color: #1a2c44;
  overflow: hidden;
  /* horizontal pinstripe like the screenshot */
  background-image:
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,.6) 0 1px,
      rgba(0,0,0,0) 1px 3px
    ),
    linear-gradient(180deg, #eef2f7 0%, #d8e0ea 100%);
}

.aqua-dialog-body{
  display: flex;
  gap: 16px;
  padding: 12px 20px 4px;
  align-items: center;
}
.aqua-dialog-icon{
  width: 56px; height: 56px;
  flex: 0 0 56px;
  display: grid; place-items: center;
}
.aqua-dialog-icon img{
  width: 100%; height: 100%;
  object-fit: contain;
  -webkit-user-drag: none;
  filter: drop-shadow(1px 2px 0 rgba(0,0,0,.15));
}
.aqua-dialog-text{ flex: 1; padding-top: 0; }
.aqua-dialog-title{
  font-weight: 700;
  font-size: 12.5px;
  line-height: 1.3;
  margin-bottom: 4px;
  color: #0d1c33;
}
.aqua-dialog-desc{
  font-size: 11px;
  color: #2a3b54;
}

.aqua-dialog-actions{
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 0 20px 14px;
}

.aqua-btn{
  appearance: none;
  border: 1px solid #6f88a8;
  border-radius: 999px;
  padding: 3px 14px;
  font: inherit;
  font-size: 11px;
  color: #16263d;
  background:
    linear-gradient(180deg, #ffffff 0%, #ffffff 48%, #d8e2ee 50%, #c2d1e3 100%);
  box-shadow:
    inset 0 1px 0 #ffffff,
    0 1px 0 rgba(0,0,0,.05);
  cursor: pointer;
  min-width: 78px;
}
.aqua-btn:hover{ filter: brightness(1.03); }
.aqua-btn:active{
  background:
    linear-gradient(180deg, #c8d6e7 0%, #b1c2da 100%);
  box-shadow: inset 0 1px 2px rgba(0,0,0,.18);
}

.aqua-btn-default{
  color: #fff;
  border-color: #1f4f8a;
  background:
    linear-gradient(180deg, #5fa3e6 0%, #3a7fc7 48%, #2f6cb1 50%, #224e85 100%);

    inset 0 1px 0 rgba(255,255,255,.55),
    0 0 0 4px rgba(80, 140, 220, .55),

  }
}

    linear-gradient(180deg, #2f6cb1 0%, #224e85 100%);
}

<script>
function init(){
  const list = document.getElementById('list');
  const preview = document.getElementById('preview');
  const previewBackdrop = document.getElementById('preview-backdrop');
  const previewImg = document.getElementById('preview-img');
  const previewCap = document.getElementById('preview-cap');
  const countEl = document.getElementById('count');
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');
  const browseBtn = document.getElementById('browse-btn');

  const STORAGE_KEY = 'milksky.files.v1';
  let FILES = []; // { name, sizeStr, kind, dateStr, icon, isImage, url }
  let selectedIdx = -1;
  let searchQuery = '';
  let sortKey = 'name'; // 'name' | 'date' | 'size' | 'kind'
  let sortDir = 1;       // 1 = asc, -1 = desc

  // Load persisted files
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) FILES = JSON.parse(raw) || [];
  } catch(_) { FILES = []; }

  function persist(){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(FILES)); } catch(_) {}
  }

  function readAsDataURL(file){
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
  }

  function fmtSize(bytes){
    if(bytes < 1024) return bytes + ' B';
    if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    if(bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
    return (bytes/1024/1024/1024).toFixed(2) + ' GB';
  }

  const FIRST_NAMES = ["alex","mira","jules","kenji","sasha","theo","luca","nora","ines","miles","yuki","omar","ivy","ren","cleo","arlo","june","kira","leo","wren","mae","otis","ada","finn","poppy","sage","rumi","blaise","nico","zola"];
  const LAST_NAMES  = ["hart","vega","monroe","ito","kimura","brooks","nilsson","okafor","park","santos","wallace","greene","koenig","romano","ashby","carter","delgado","fontaine","huang","ivers","jovic","langley","mccoy","nakamura","ortega","pham","quinn","rourke","stein","tasse"];
  function randDateStr(){
    const start = new Date(2007, 0, 1).getTime();
    const end = Date.now();
    const d = new Date(start + Math.random() * (end - start));
    const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return String(d.getDate()).padStart(2,'0') + '-' + m[d.getMonth()].toLowerCase() + '-' + d.getFullYear();
  }
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function randomName(originalName){
    const ext = (originalName.split('.').pop() || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    const start = new Date(2000, 0, 1).getTime();
    const end = Date.now();
    const d = new Date(start + Math.random() * (end - start));
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mi = String(d.getMinutes()).padStart(2, '0');
    const ss = String(d.getSeconds()).padStart(2, '0');
    const variants = [
      yyyy + '-' + mm + '-' + dd,
      yyyy + mm + dd + '_' + hh + mi,
      dd + '.' + mm + '.' + yyyy,
      yyyy + '_' + mm + '_' + dd + '_' + hh + mi + ss,
      'IMG_' + yyyy + mm + dd + '_' + hh + mi,
    ];
    const base = variants[Math.floor(Math.random() * variants.length)];
    return ext ? base + '.' + ext : base;
  }
  function fmtDate(d){
    const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return String(d.getDate()).padStart(2,'0') + ' ' + m[d.getMonth()] + ' ' + d.getFullYear() +
           ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  function kindFor(file){
    const t = file.type || '';
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    if(t.startsWith('image/')) return t.replace('image/','').toUpperCase() + ' image';
    if(t.startsWith('video/')) return t.replace('video/','').toUpperCase() + ' video';
    if(t.startsWith('audio/')) return t.replace('audio/','').toUpperCase() + ' audio';
    if(t === 'application/pdf') return 'PDF document';
    if(ext === 'zip') return 'ZIP archive';
    if(ext === 'txt' || ext === 'md') return 'Plain text';
    if(ext === 'html') return 'HTML document';
    if(ext === 'js' || ext === 'ts' || ext === 'css') return 'Source file';
    return ext ? ext.toUpperCase() + ' file' : 'File';
  }
  function iconFor(file){
    const t = file.type || '';
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    if(t.startsWith('image/')) return 'img';
    if(t === 'application/pdf') return 'pdf';
    if(ext === 'zip') return 'zip';
    if(t.startsWith('audio/') || t.startsWith('video/')) return 'app';
    return 'doc';
  }

  function sortValue(f, key){
    if(key === 'name') return f.name.toLowerCase();
    if(key === 'date') return f.dateStr;
    if(key === 'size') return f.sizeBytes || 0;
    if(key === 'kind') return f.kind.toLowerCase();
    return '';
  }

  let viewMode = 'list'; // 'list' | 'grid'
  const colsEl = document.querySelector('.cols');

  function showPreview(f, idx){
    selectedIdx = idx;
    previewImg.className = 'img';
    previewImg.innerHTML = '';
    if(f.isImage){
      const im = document.createElement('img');
      im.src = f.url;
      im.addEventListener('load', () => {
        if(im.naturalHeight > im.naturalWidth) im.classList.add('portrait');
      });
      previewImg.appendChild(im);
    } else {
      const ph = document.createElement('div');
      ph.className = 'ph ' + (f.icon === 'pdf' ? 'pdf' : f.icon === 'zip' ? 'zip' : 'notes');
      previewImg.appendChild(ph);
    }
    previewCap.textContent = '/ ' + f.name;
    preview.classList.add('show');
    previewBackdrop.classList.add('show');
    render();
  }

  function render(){
    list.innerHTML = '';

    const q = searchQuery.trim().toLowerCase();
    const visible = FILES
      .map((f, idx) => ({ f, idx }))
      .filter(({ f }) => !q || f.name.toLowerCase().includes(q))
      .sort((a, b) => {
        const va = sortValue(a.f, sortKey), vb = sortValue(b.f, sortKey);
        return va < vb ? -sortDir : va > vb ? sortDir : 0;
      });

    if(viewMode === 'grid'){
      colsEl.style.display = 'none';
      list.classList.add('grid-view');
      visible.forEach(({ f, idx }) => {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.dataset.idx = idx;

        if(f.isImage && f.url){
          const img = document.createElement('img');
          img.src = f.url;
          img.alt = f.name;
          img.loading = 'lazy';
          item.appendChild(img);
        } else {
          const iconWrap = document.createElement('div');
          iconWrap.className = 'grid-icon';
          const g = document.createElement('span');
          g.className = 'g ' + f.icon;
          iconWrap.appendChild(g);
          item.appendChild(iconWrap);
        }

        const label = document.createElement('div');
        label.className = 'grid-label';
        label.textContent = f.name;
        item.appendChild(label);

        const delBtn = document.createElement('button');
        delBtn.className = 'grid-del';
        delBtn.textContent = '×';
        delBtn.title = 'Delete';
        delBtn.setAttribute('aria-label', 'Delete');
        delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteAt(idx); });
        item.appendChild(delBtn);

        item.addEventListener('click', (e) => {
          if(e.target.closest('.grid-del')) return;
          showPreview(f, idx);
        });

        list.appendChild(item);
      });

    } else {
      colsEl.style.display = '';
      list.classList.remove('grid-view');

      // Update column header arrows
      document.querySelectorAll('.cols > div[data-sort]').forEach(el => {
        const k = el.dataset.sort;
        el.classList.toggle('sorted', k === sortKey);
        if(k === sortKey){ el.dataset.dir = sortDir === 1 ? 'asc' : 'desc'; }
        else { delete el.dataset.dir; }
      });

      visible.forEach(({ f, idx }) => {
        const row = document.createElement('div');
        row.className = 'row' + (idx === selectedIdx ? ' selected' : '');
        row.dataset.idx = idx;
        row.innerHTML =
          '<div class="ico"><span class="g ' + f.icon + '"></span></div>' +
          '<div class="name">' + f.name + '</div>' +
          '<div>' + f.dateStr + '</div>' +
          '<div>' + f.sizeStr + '</div>' +
          '<div class="kind-cell">' +
            '<span class="kind-text">' + f.kind + '</span>' +
            '<button class="del-btn" title="Delete" aria-label="Delete">×</button>' +
          '</div>';

        row.querySelector('.del-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          deleteAt(idx);
        });
        row.addEventListener('click', (e) => {
          if(e.target.closest('.name') || e.target.closest('.del-btn')) return;
          selectedIdx = idx;
          render();
        });

        const nameEl = row.querySelector('.name');
        nameEl.addEventListener('click', (e) => {
          e.stopPropagation();
          showPreview(f, idx);
        });

        row.addEventListener('dblclick', () => { if(f.url) window.open(f.url, '_blank'); });

        list.appendChild(row);
      });
    }

    countEl.textContent = q ? visible.length + ' of ' + FILES.length : FILES.length;
    if(FILES.length === 0){ dropzone.classList.add('empty'); }
    else { dropzone.classList.remove('empty'); }
  }

  async function addFiles(fileList){
    const arr = [...fileList].filter(f => (f.type || '').startsWith('image/'));
    if(arr.length === 0){
      // Briefly flash the dropzone to indicate non-images were rejected
      dropzone.classList.add('reject');
      setTimeout(() => dropzone.classList.remove('reject'), 600);
      return;
    }
    for(const file of arr){
      let url = '';
      try {
        // Persist as data URL so files survive reload
        url = await readAsDataURL(file);
      } catch(_) {
        url = URL.createObjectURL(file);
      }
      FILES.push({
        name: randomName(file.name),
        sizeStr: fmtSize(file.size),
        sizeBytes: file.size,
        kind: kindFor(file),
        dateStr: fmtDate(new Date(file.lastModified || Date.now())),
        icon: iconFor(file),
        isImage: (file.type || '').startsWith('image/'),
        url
      });
    }
    persist();
    render();
  }

  function deleteAt(idx){
    if(idx < 0 || idx >= FILES.length) return;
    FILES.splice(idx, 1);
    if(selectedIdx === idx) selectedIdx = -1;
    else if(selectedIdx > idx) selectedIdx -= 1;
    persist();
    render();
  }

  function clearAll(){
    if(FILES.length === 0) return;
    if(!confirm('Delete all ' + FILES.length + ' files from the database?')) return;
    FILES = [];
    selectedIdx = -1;
    persist();
    render();
  }

  // Drag & drop — bind on document (capture) and on dropzone explicitly
  function onDragOver(e){
    e.preventDefault();
    e.stopPropagation();
    if(e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
    dropzone.classList.add('hot');
  }
  function onDragLeave(e){
    if(e.target === dropzone || e.target === document.body) dropzone.classList.remove('hot');
  }
  function onDrop(e){
    e.preventDefault();
    e.stopPropagation();
    dropzone.classList.remove('hot');
    const files = e.dataTransfer && e.dataTransfer.files;
    if(files && files.length) addFiles(files);
  }

  ['dragenter','dragover'].forEach(ev => {
    window.addEventListener(ev, onDragOver, true);
    dropzone.addEventListener(ev, onDragOver);
  });
  window.addEventListener('dragleave', onDragLeave, true);
  window.addEventListener('drop', onDrop, true);
  dropzone.addEventListener('drop', onDrop);

  browseBtn.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    if(fileInput.files && fileInput.files.length) addFiles(fileInput.files);
    fileInput.value = '';
  });

  // Search
  const searchInput = document.querySelector('.search input');
  if(searchInput){
    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      selectedIdx = -1;
      render();
    });
    searchInput.addEventListener('keydown', (e) => {
      if(e.key === 'Escape'){ searchInput.value = ''; searchQuery = ''; render(); }
    });
  }

  // Column sort headers
  document.querySelectorAll('.cols > div[data-sort]').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => {
      const k = el.dataset.sort;
      if(sortKey === k){ sortDir *= -1; }
      else { sortKey = k; sortDir = 1; }
      render();
    });
  });

  // View mode buttons (Icons / List)
  const viewBtns = document.querySelectorAll('.nav .btn[title="Icons"], .nav .btn[title="List"], .nav .btn[title="Columns"]');
  document.querySelector('.btn[title="Icons"]')?.addEventListener('click', () => {
    viewMode = 'grid';
    viewBtns.forEach(b => b.classList.remove('active'));
    document.querySelector('.btn[title="Icons"]').classList.add('active');
    render();
  });
  document.querySelector('.btn[title="List"]')?.addEventListener('click', () => {
    viewMode = 'list';
    viewBtns.forEach(b => b.classList.remove('active'));
    document.querySelector('.btn[title="List"]').classList.add('active');
    render();
  });

  function hidePreview(){
    preview.classList.remove('show');
    previewBackdrop.classList.remove('show');
  }

  // Backdrop click dismisses preview (and blocks clicks from reaching elements behind it)
  previewBackdrop.addEventListener('click', hidePreview);

  // Hide preview when clicking outside the name link or preview itself
  document.addEventListener('click', (e) => {
    if(!preview.classList.contains('show')) return;
    if(e.target.closest('.name')) return;
    if(e.target.closest('.preview')) return;
    if(e.target === previewBackdrop) return; // handled by backdrop listener
    hidePreview();
  });

  // Esc dismisses the preview
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && preview.classList.contains('show')) hidePreview();
  });

  // Delete key removes selected row
  document.addEventListener('keydown', (e) => {
    if((e.key === 'Delete' || e.key === 'Backspace') && selectedIdx >= 0){
      const target = e.target;
      if(target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA')) return;
      e.preventDefault();
      deleteAt(selectedIdx);
    }
  });

  // Clear all button (in toolbar)
  const clearBtn = document.getElementById('clear-all');
  if(clearBtn) clearBtn.addEventListener('click', clearAll);

  render();

  // ---------- Drag window ----------
  const win = document.querySelector('.win');
  const titlebar = win.querySelector('.titlebar');
  let dragOff = null;
  titlebar.addEventListener('mousedown', (e) => {
    if(e.target.closest('.dot')) return; // don't drag from buttons
    const r = win.getBoundingClientRect();
    dragOff = { dx: e.clientX - r.left, dy: e.clientY - r.top };
    // Lock window to absolute viewport position so flex-centering stops fighting us
    win.style.position = 'fixed';
    win.style.margin = '0';
    win.style.left = r.left + 'px';
    win.style.top = r.top + 'px';
    document.body.style.cursor = 'grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if(!dragOff) return;
    const r = win.getBoundingClientRect();
    let x = e.clientX - dragOff.dx;
    let y = e.clientY - dragOff.dy;
    // Clamp so the entire window stays within the viewport
    const maxX = window.innerWidth - r.width;
    const maxY = window.innerHeight - r.height;
    if(x < 0) x = 0;
    if(y < 0) y = 0;
    if(x > maxX) x = maxX;
    if(y > maxY) y = maxY;
    win.style.left = x + 'px';
    win.style.top = y + 'px';
  });
  window.addEventListener('mouseup', () => {
    if(!dragOff) return;
    dragOff = null;
    document.body.style.cursor = '';
  });

  // ---------- Genie minimize ----------
  const hideBtn = document.getElementById('hide-btn');
  const finderDock = document.getElementById('dock-finder');
  let busy = false;

  function isHidden(){ return win.classList.contains('genie-out'); }

  function genieDown(){
    const r = win.getBoundingClientRect();
    const vh = window.innerHeight, vw = window.innerWidth;
    let tx = vw / 2, ty = vh - 4;
    if (finderDock) {
      const fr = finderDock.getBoundingClientRect();
      tx = fr.left + fr.width / 2;
      ty = fr.top + fr.height / 2;
    }
    win.style.setProperty('--gx', (tx - (r.left + r.width / 2)) + 'px');
    win.style.setProperty('--gy', (ty - r.top) + 'px');
    win.classList.add('genie-out');
    if (finderDock) finderDock.classList.add('has-window');
  }

  function hideInstant(){
    // Force a measure so getBoundingClientRect reflects layout, then set vars
    // and add genie-out without playing the transition.
    const prev = win.style.transition;
    win.style.transition = 'none';
    const r = win.getBoundingClientRect();
    const vh = window.innerHeight, vw = window.innerWidth;
    let tx = vw / 2, ty = vh - 4;
    if (finderDock) {
      const fr = finderDock.getBoundingClientRect();
      tx = fr.left + fr.width / 2;
      ty = fr.top + fr.height / 2;
    }
    win.style.setProperty('--gx', (tx - (r.left + r.width / 2)) + 'px');
    win.style.setProperty('--gy', (ty - r.top) + 'px');
    win.classList.add('genie-out');
    if (finderDock) finderDock.classList.add('has-window');
    // Force reflow then restore the transition
    void win.offsetWidth;
    win.style.transition = prev;
  }
  function genieUp(){
    win.classList.add('genie-in');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      win.classList.remove('genie-out');
      win.classList.remove('genie-in');
    }));
    if (finderDock) finderDock.classList.remove('has-window');
  }

  hideBtn.addEventListener('click', () => {
    if(busy || isHidden()) return;
    busy = true;
    genieDown();
    setTimeout(() => { busy = false; }, 450);
  });

  if (finderDock) {
    finderDock.addEventListener('click', () => {
      if(busy || !isHidden()) return;
      busy = true;
      genieUp();
      setTimeout(() => { busy = false; }, 450);
    });
  }

  // Desktop folder icon: same restore behavior as the Finder dock icon
  const deskFolder = document.getElementById('desk-myspace');
  if (deskFolder) {
    deskFolder.addEventListener('click', (e) => {
      e.preventDefault();
      if(busy || !isHidden()) return;
      busy = true;
      genieUp();
      setTimeout(() => { busy = false; }, 450);
    });
  }

  // Start with the window hidden on every page load
  hideInstant();

  // ---------- Trash confirm dialog ----------
  const trashBtn = document.getElementById('dock-trash');
  const modal = document.getElementById('trash-modal');
  const tdCancel = document.getElementById('td-cancel');
  const tdOk = document.getElementById('td-ok');

  function openTrashModal(){
    if(!modal) return;
    modal.hidden = false;
    // focus the default button so Enter triggers it
    setTimeout(() => tdOk && tdOk.focus(), 0);
  }
  function closeTrashModal(){
    if(!modal) return;
    modal.hidden = true;
  }

  if (trashBtn) {
    trashBtn.addEventListener('click', (e) => {
      e.preventDefault();
      openTrashModal();
    });
  }
  if (tdCancel) tdCancel.addEventListener('click', closeTrashModal);
  if (tdOk) tdOk.addEventListener('click', closeTrashModal);
  if (modal) {
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeTrashModal();
    });
  }
  document.addEventListener('keydown', (e) => {
    if (modal && !modal.hidden && (e.key === 'Escape')) closeTrashModal();
  });
}

document.addEventListener('DOMContentLoaded', init);

</script>
