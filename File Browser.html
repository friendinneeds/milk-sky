<!DOCTYPE html><html lang="en"><head>


<meta charset="utf-8">
<title>Aliens Exist</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="styles.css">
</head>
<body style="background-color: rgb(226, 232, 238);">

<a class="desktop-icon" id="desk-myspace" href="#" title="milk sky">
  <div class="desktop-icon-img" aria-hidden="true">
    <img src="assets/folder.png" alt="" draggable="false">
  </div>
  <div class="desktop-icon-label">milk sky</div>
</a>

<a class="desktop-icon desktop-icon-arena" id="desk-arena" href="https://www.are.na/anton-palmer/channels" target="_blank" rel="noopener noreferrer" title="are.na">
  <div class="desktop-icon-img" aria-hidden="true">
    <img src="assets/arena.png" alt="" draggable="false" />
  </div>
  <div class="desktop-icon-label">are.na</div>
</a>

<a class="desktop-icon desktop-icon-contacts" id="desk-contacts" href="mailto:naggetss@gmail.com" title="Contacts">
  <div class="desktop-icon-img" aria-hidden="true">
    <img src="assets/contacts.svg" alt="" draggable="false">
  </div>
  <div class="desktop-icon-label">Contacts</div>
</a>

<div class="win genie-out" role="application" aria-label="File browser" style="--gx: 0px; --gy: 0px;">
  <div class="titlebar">
    <div class="dots">
      <div class="dot d-r"></div>
      <div class="dot d-y" id="hide-btn" title="Hide"></div>
      <div class="dot d-g"></div>
    </div>
    <div class="title">milk sky</div>
  </div>

  <div class="toolbar">
    <div class="nav">
      <button class="btn" title="Back">◀</button>
      <button class="btn" title="Forward">▶</button>
      <button class="btn" title="Up">▲</button>
    </div>
    <div class="nav" style="margin-left:6px">
      <button class="btn active" title="Icons">▦</button>
      <button class="btn" title="List">☰</button>
      <button class="btn" title="Columns">|||</button>
    </div>
    <div class="crumb"><a>Desktop</a> &gt; <a>dear life</a> &gt; <span>milk sky</span></div>
    <div class="spacer"></div>
    <button class="btn" id="clear-all" title="Delete all files">Clear all</button>
    <div class="search"><input placeholder="search..."></div>
  </div>

  <div class="cols">
    <div></div>
    <div class="sorted" data-sort="name">Name</div>
    <div data-sort="date">Date Modified</div>
    <div data-sort="size">Size</div>
    <div data-sort="kind">Kind</div>
  </div>

  <div class="list" id="list"></div>

  <div class="dropzone empty" id="dropzone">
    <div class="dz-inner">
      <div class="dz-title">drop images here</div>
      <div class="dz-sub">…or <button id="browse-btn" class="dz-link">browse</button> from your computer</div>
    </div>
  </div>
  <input type="file" id="file-input" accept="image/*" multiple="" style="display:none">

  <div class="status">
    <div><span id="count">0</span> items, 14.3 GB available</div>
    <div class="pill">/Desktop/dear life/milk sky</div>
  </div>
</div>

<div class="preview-backdrop" id="preview-backdrop" aria-hidden="true"></div>
<div class="preview" id="preview" aria-hidden="true">
  <div class="img" id="preview-img"></div>
  <div class="cap" id="preview-cap">filename</div>
</div>

<div id="genie-stage" aria-hidden="true">
  <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <clipPath id="genie-clip" clipPathUnits="userSpaceOnUse">
        <path id="genie-path" d=""></path>
      </clipPath>
    </defs>
    <foreignObject id="genie-fo" x="0" y="0" width="100" height="100" clip-path="url(#genie-clip)">
      <div xmlns="http://www.w3.org/1999/xhtml" id="genie-content"></div>
    </foreignObject>
  </svg>
</div>

<div class="dock" id="dock" aria-label="Dock">
  <div class="dock-inner">
    <button class="dock-item has-window" id="dock-finder" title="Finder" aria-label="Finder">
      <img src="assets/finder.png" alt="Finder">
    </button>
    <div class="dock-sep"></div>
    <button class="dock-item" id="dock-trash" title="Trash" aria-label="Trash">
      <img src="assets/trash.png" alt="Trash">
    </button>
  </div>
</div>

<script src="app.js"></script>

<!-- Trash confirm dialog (Mac OS X Aqua-style) -->
<div class="modal-overlay" id="trash-modal" hidden>
  <div class="aqua-dialog" role="alertdialog" aria-labelledby="td-title" aria-describedby="td-desc">
    <div class="aqua-dialog-body">
      <div class="aqua-dialog-icon">
        <img src="assets/finder.png" alt="" draggable="false">
      </div>
      <div class="aqua-dialog-text">
        <div class="aqua-dialog-title" id="td-title">Do you really want to delete the internet?</div>
        <div class="aqua-dialog-desc" id="td-desc">You cannot undo this action.</div>
      </div>
    </div>
    <div class="aqua-dialog-actions">
      <button type="button" class="aqua-btn" id="td-cancel">Cancel</button>
      <button type="button" class="aqua-btn aqua-btn-default" id="td-ok">OK</button>
    </div>
  </div>
</div>


</body></html>
