<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <!-- book body -->
  <rect x="10" y="5" width="36" height="46" rx="3" fill="#e8f0f8" stroke="#8aabcc" stroke-width="1.2"/>
  <!-- spine -->
  <rect x="10" y="5" width="8" height="46" rx="2" fill="#4a80b8"/>
  <!-- spine highlight -->
  <rect x="11" y="5" width="2" height="46" rx="1" fill="rgba(255,255,255,.35)"/>
  <!-- ring holes -->
  <circle cx="14" cy="16" r="2.2" fill="#2a5080"/>
  <circle cx="14" cy="28" r="2.2" fill="#2a5080"/>
  <circle cx="14" cy="40" r="2.2" fill="#2a5080"/>
  <!-- page lines -->
  <line x1="23" y1="18" x2="40" y2="18" stroke="#9ab8d4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="22" x2="38" y2="22" stroke="#b8d0e8" stroke-width="1" stroke-linecap="round"/>
  <line x1="23" y1="29" x2="40" y2="29" stroke="#9ab8d4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="33" x2="38" y2="33" stroke="#b8d0e8" stroke-width="1" stroke-linecap="round"/>
  <line x1="23" y1="40" x2="40" y2="40" stroke="#9ab8d4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="23" y1="44" x2="35" y2="44" stroke="#b8d0e8" stroke-width="1" stroke-linecap="round"/>
  <!-- letter tab -->
  <rect x="42" y="13" width="6" height="10" rx="1.5" fill="#4a80b8"/>
  <text x="45" y="21" font-family="Verdana,sans-serif" font-size="6" font-weight="bold" fill="white" text-anchor="middle">A</text>
</svg>
