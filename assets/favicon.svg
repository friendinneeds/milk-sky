<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- hat brim -->
  <ellipse cx="32" cy="18" rx="20" ry="5" fill="white" stroke="black" stroke-width="3"/>
  <!-- left ear -->
  <ellipse cx="16" cy="10" rx="7" ry="4.5" fill="white" stroke="black" stroke-width="3"/>
  <!-- right ear -->
  <ellipse cx="48" cy="10" rx="7" ry="4.5" fill="white" stroke="black" stroke-width="3"/>
  <!-- M crown between ears -->
  <polyline points="20,14 24,7 30,12 38,7 42,14" fill="none" stroke="black" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- green alien head -->
  <ellipse cx="32" cy="41" rx="20" ry="21" fill="#aadd00" stroke="black" stroke-width="3"/>

  <!-- left eye socket -->
  <ellipse cx="23" cy="39" rx="9" ry="10" fill="black"/>
  <ellipse cx="21" cy="35" rx="3" ry="3.5" fill="white" opacity="0.9"/>

  <!-- right eye socket -->
  <ellipse cx="41" cy="39" rx="9" ry="10" fill="black"/>
  <ellipse cx="39" cy="35" rx="3" ry="3.5" fill="white" opacity="0.9"/>

  <!-- small mouth -->
  <path d="M27 53 Q32 57 37 53" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
</svg>
